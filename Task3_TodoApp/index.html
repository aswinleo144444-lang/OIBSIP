<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeonTask | OIBSIP – Level 2 Task 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #030D09;
      --surface: #071A0F;
      --card:    #0A2114;
      --neon:    #00FF88;
      --neon2:   #00E676;
      --cyan:    #00E5FF;
      --red:     #FF1744;
      --amber:   #FFD600;
      --text:    #E8FFF2;
      --muted:   #4A7A5E;
      --border:  rgba(0,255,136,0.12);
      --glow:    0 0 18px rgba(0,255,136,0.2);
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      padding-bottom: 60px;
      background-image: radial-gradient(ellipse at 20% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(0,229,118,0.03) 0%, transparent 50%);
    }

    /* TOPBAR */
    .topbar {
      background: rgba(3,13,9,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Fira Code', monospace;
      font-size: 18px; font-weight: 500;
      color: var(--neon);
      text-shadow: 0 0 12px rgba(0,255,136,0.5);
      letter-spacing: 1px;
    }
    .badge {
      font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--cyan);
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 4px; padding: 4px 12px;
    }
    .date-txt {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--muted);
    }

    .main { max-width: 680px; margin: 0 auto; padding: 32px 20px 0; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; text-align: center;
      box-shadow: var(--glow);
    }
    .stat .val { font-family: 'Fira Code', monospace; font-size: 28px; font-weight: 500; line-height: 1; }
    .stat .val.t { color: var(--cyan); text-shadow: 0 0 10px rgba(0,229,255,0.4); }
    .stat .val.p { color: var(--amber); text-shadow: 0 0 10px rgba(255,214,0,0.4); }
    .stat .val.d { color: var(--neon);  text-shadow: 0 0 10px rgba(0,255,136,0.4); }
    .stat .lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    /* PROGRESS */
    .prog-wrap { margin-bottom: 24px; }
    .prog-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .prog-top span { color: var(--neon); font-weight: 600; }
    .prog-bg { background: var(--card); border: 1px solid var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
    .prog-fill { height: 6px; border-radius: 4px; background: linear-gradient(90deg, var(--cyan), var(--neon)); transition: width 0.4s; box-shadow: 0 0 8px rgba(0,255,136,0.4); }

    /* ADD TASK */
    .add-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 20px;
      margin-bottom: 28px; box-shadow: var(--glow);
    }
    .add-lbl { font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .add-row { display: flex; gap: 10px; }
    .t-input {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 11px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .t-input::placeholder { color: var(--muted); }
    .t-input:focus { border-color: var(--neon); box-shadow: 0 0 0 2px rgba(0,255,136,0.1); }
    .add-btn {
      background: var(--neon); border: none;
      border-radius: 6px; padding: 11px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      color: #030D09; cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      box-shadow: 0 0 16px rgba(0,255,136,0.3);
    }
    .add-btn:hover { filter: brightness(1.1); }
    .add-btn:active { transform: scale(0.96); }

    /* SECTION */
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .sec-title { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-p { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .dot-d { background: var(--neon);  box-shadow: 0 0 6px var(--neon); }
    .clr-btn { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; transition: color 0.15s, border-color 0.15s; }
    .clr-btn:hover { color: var(--red); border-color: var(--red); }

    /* TASK LIST */
    .t-section { margin-bottom: 28px; }
    .t-list { display: flex; flex-direction: column; gap: 8px; }
    .t-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 13px 14px;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.22s ease;
    }
    .t-item:hover { border-color: rgba(0,255,136,0.25); transform: translateX(2px); }
    .t-item.p-item { border-left: 2px solid var(--amber); }
    .t-item.d-item { border-left: 2px solid var(--neon); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .cb-wrap input[type="checkbox"] { display: none; }
    .cb-wrap label {
      width: 20px; height: 20px;
      border: 1px solid var(--muted);
      border-radius: 4px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: all 0.2s; margin-top: 1px;
      color: transparent;
    }
    .cb-wrap input:checked + label { background: var(--neon); border-color: var(--neon); color: #030D09; box-shadow: 0 0 8px rgba(0,255,136,0.4); }
    .cb-wrap label:hover { border-color: var(--neon); }

    .t-content { flex: 1; min-width: 0; }
    .t-text { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; word-break: break-word; }
    .d-item .t-text { text-decoration: line-through; color: var(--muted); }
    .t-meta { font-family: 'Fira Code', monospace; font-size: 10px; color: var(--muted); }
    .t-meta .done-t { color: var(--neon); }

    .t-actions { display: flex; gap: 5px; }
    .a-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 5px; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); transition: all 0.15s; }
    .a-btn.e:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.06); }
    .a-btn.d:hover { border-color: var(--red); color: var(--red); background: rgba(255,23,68,0.06); }

    .empty { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; border: 1px dashed var(--border); border-radius: 8px; font-family: 'Fira Code', monospace; }
    .empty .em { font-size: 24px; margin-bottom: 6px; }

    /* MODAL */
    .m-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
    .m-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid rgba(0,255,136,0.2); border-radius: 12px; padding: 24px; width: min(420px,100%); box-shadow: 0 0 40px rgba(0,255,136,0.1); }
    .m-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--neon); }
    .m-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 11px 14px; font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text); outline: none; margin-bottom: 14px; }
    .m-input:focus { border-color: var(--neon); }
    .m-acts { display: flex; gap: 10px; justify-content: flex-end; }
    .m-cancel { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; }
    .m-save { background: var(--neon); border: none; border-radius: 6px; padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #030D09; cursor: pointer; }

    footer { text-align: center; margin-top: 32px; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    footer span { color: var(--neon); text-shadow: 0 0 8px rgba(0,255,136,0.4); }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">// NeonTask</div>
  <div class="badge">OIBSIP · Level 2 · Task 3</div>
  <div class="date-txt" id="dt"></div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="val t" id="sT">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="val p" id="sP">0</div><div class="lbl">Pending</div></div>
    <div class="stat"><div class="val d" id="sD">0</div><div class="lbl">Done</div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-top"><span id="pLbl">Progress</span><span id="pPct">0%</span></div>
    <div class="prog-bg"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  </div>
  <div class="add-box">
    <div class="add-lbl">// add_new_task</div>
    <div class="add-row">
      <input class="t-input" id="tIn" type="text" placeholder="Enter task description..." maxlength="120"/>
      <button class="add-btn" onclick="add()">+ Add</button>
    </div>
  </div>
  <div class="t-section">
    <div class="sec-head">
      <div class="sec-title"><div class="dot dot-p"></div>Pending Tasks</div>
      <button class="clr-btn" onclick="clrSec('p')">Clear All</button>
    </div>
    <div class="t-list" id="pList"><div class="empty" id="pEmp"><div class="em">📋</div>No pending tasks_</div></div>
  </div>
  <div class="t-section">
    <div class="sec-head">
      <div class="sec-title"><div class="dot dot-d"></div>Completed Tasks</div>
      <button class="clr-btn" onclick="clrSec('d')">Clear All</button>
    </div>
    <div class="t-list" id="dList"><div class="empty" id="dEmp"><div class="em">✅</div>Nothing completed yet_</div></div>
  </div>
</div>
<div class="m-overlay" id="mo">
  <div class="modal">
    <div class="m-title">// edit_task</div>
    <input class="m-input" id="mIn" type="text" maxlength="120"/>
    <div class="m-acts">
      <button class="m-cancel" onclick="closeM()">Cancel</button>
      <button class="m-save" onclick="saveM()">Save</button>
    </div>
  </div>
</div>
<footer>Made with ♥ for <span>Oasis Infobyte</span> Internship</footer>
<script>
  let tasks=[],eId=null,idc=0;
  const fmt=ts=>{const d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  document.getElementById('dt').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  function add(){const v=document.getElementById('tIn').value.trim();if(!v)return;tasks.push({id:++idc,text:v,done:false,addedAt:Date.now(),doneAt:null});document.getElementById('tIn').value='';render();}
  document.getElementById('tIn').addEventListener('keydown',e=>{if(e.key==='Enter')add();});
  function toggle(id){const t=tasks.find(t=>t.id===id);if(!t)return;t.done=!t.done;t.doneAt=t.done?Date.now():null;render();}
  function del(id){tasks=tasks.filter(t=>t.id!==id);render();}
  function openE(id){const t=tasks.find(t=>t.id===id);if(!t)return;eId=id;document.getElementById('mIn').value=t.text;document.getElementById('mo').classList.add('open');setTimeout(()=>document.getElementById('mIn').focus(),50);}
  function closeM(){document.getElementById('mo').classList.remove('open');eId=null;}
  function saveM(){const v=document.getElementById('mIn').value.trim();if(!v)return;const t=tasks.find(t=>t.id===eId);if(t)t.text=v;closeM();render();}
  function clrSec(type){tasks=type==='p'?tasks.filter(t=>t.done):tasks.filter(t=>!t.done);render();}
  document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeM();});
  document.getElementById('mIn').addEventListener('keydown',e=>{if(e.key==='Enter')saveM();if(e.key==='Escape')closeM();});
  function mkItem(t){
    const div=document.createElement('div');
    div.className='t-item '+(t.done?'d-item':'p-item');
    const uid='cb'+t.id;
    div.innerHTML=`<div class="cb-wrap"><input type="checkbox" id="${uid}" ${t.done?'checked':''}><label for="${uid}">✓</label></div><div class="t-content"><div class="t-text">${esc(t.text)}</div><div class="t-meta">added ${fmt(t.addedAt)}${t.doneAt?` · <span class="done-t">done ${fmt(t.doneAt)}</span>`:''}</div></div><div class="t-actions"><button class="a-btn e" title="Edit">✏️</button><button class="a-btn d" title="Delete">🗑️</button></div>`;
    div.querySelector('input').onchange=()=>toggle(t.id);
    div.querySelector('.e').onclick=()=>openE(t.id);
    div.querySelector('.d').onclick=()=>del(t.id);
    return div;
  }
  function render(){
    const p=tasks.filter(t=>!t.done),d=tasks.filter(t=>t.done);
    document.getElementById('sT').textContent=tasks.length;
    document.getElementById('sP').textContent=p.length;
    document.getElementById('sD').textContent=d.length;
    const pct=tasks.length?Math.round(d.length/tasks.length*100):0;
    document.getElementById('pFill').style.width=pct+'%';
    document.getElementById('pPct').textContent=pct+'%';
    document.getElementById('pLbl').textContent=pct===100&&tasks.length?'🎉 All done!':'progress';
    const pL=document.getElementById('pList'),dL=document.getElementById('dList');
    pL.querySelectorAll('.t-item').forEach(i=>i.remove());
    dL.querySelectorAll('.t-item').forEach(i=>i.remove());
    document.getElementById('pEmp').style.display=p.length?'none':'block';
    document.getElementById('dEmp').style.display=d.length?'none':'block';
    p.forEach(t=>pL.appendChild(mkItem(t)));
    d.forEach(t=>dL.appendChild(mkItem(t)));
  }
  render();
</script>
</body>
</html>
